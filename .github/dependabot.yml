version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      go-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(go)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(gha)"

  - package-ecosystem: "npm"
    directory: "/npm/slack-mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(npm)"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      docker-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(docker)"
